<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Joga Bonito — Committee Scorer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --green: #00C853;
    --green-dark: #00802e;
    --gold: #FFD600;
    --dark: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #888;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  header {
    background: var(--dark);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--green);
  }

  .logo span { color: var(--text); }

  .badge {
    font-size: 10px;
    font-weight: 500;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .section {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    padding: 14px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--green); }
  textarea::placeholder { color: var(--muted); }

  .tenet-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .tenet-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    width: 100px;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }

  .slider-wrap {
    flex: 1;
    position: relative;
  }

  input[type=range] {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    border-radius: 2px;
    background: var(--surface2);
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--green);
    cursor: pointer;
    border: 2px solid var(--dark);
  }

  .tenet-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--green);
    width: 24px;
    text-align: right;
    flex-shrink: 0;
  }

  .toggles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .toggle-group label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 8px;
  }

  .toggle-row {
    display: flex;
    gap: 6px;
  }

  .toggle-btn {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 8px 4px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .toggle-btn.active {
    background: var(--green);
    border-color: var(--green);
    color: var(--dark);
  }

  .generate-btn {
    width: calc(100% - 40px);
    margin: 20px;
    background: var(--green);
    border: none;
    border-radius: var(--radius);
    color: var(--dark);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .generate-btn:active { transform: scale(0.98); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .loading {
    display: none;
    padding: 40px 20px;
    text-align: center;
  }

  .loading.show { display: block; }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
  }

  .results { display: none; padding: 0 20px; }
  .results.show { display: block; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }

  .results-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--muted);
  }

  .squad-avg {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--gold);
    line-height: 1;
  }

  .squad-avg-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: right;
  }

  .persona-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .persona-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .persona-identity {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .persona-flag {
    font-size: 22px;
    line-height: 1;
  }

  .persona-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    color: var(--text);
  }

  .persona-country {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .persona-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--green);
    line-height: 1;
  }

  .persona-score.high { color: var(--gold); }
  .persona-score.low { color: #ff5252; }

  .persona-verdict {
    font-size: 13px;
    line-height: 1.5;
    color: #bbb;
    font-style: italic;
    border-top: 1px solid var(--border);
    padding-top: 10px;
    margin-top: 2px;
  }

  .score-bar {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    margin: 8px 0;
    overflow: hidden;
  }

  .score-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--green);
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .disagreement-card {
    background: var(--surface2);
    border: 1px solid rgba(255, 214, 0, 0.2);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 16px;
  }

  .disagreement-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .disagreement-text {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  .reset-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px;
    cursor: pointer;
    margin-top: 8px;
    margin-bottom: 20px;
    transition: all 0.15s;
  }

  .reset-btn:hover { border-color: var(--green); color: var(--green); }

  .difficulty-row {
    display: flex;
    gap: 6px;
  }

  .diff-btn {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    padding: 8px 2px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    letter-spacing: 0.3px;
  }

  .diff-btn.active {
    background: var(--surface2);
    border-color: rgba(255,255,255,0.3);
    color: var(--text);
  }

  .error-box {
    display: none;
    background: rgba(255,82,82,0.1);
    border: 1px solid rgba(255,82,82,0.3);
    border-radius: var(--radius);
    padding: 14px;
    margin: 16px 20px;
    font-size: 13px;
    color: #ff5252;
    line-height: 1.5;
  }

  .error-box.show { display: block; }
</style>
</head>
<body>

<header>
  <div class="logo">Joga <span>Bonito</span></div>
  <div class="badge">Committee Scorer</div>
</header>

<div id="inputSection">

  <div class="section">
    <div class="section-label">Describe the moment</div>
    <textarea id="clipDesc" rows="3" placeholder="e.g. Yamal receives tight, single touch eliminates two defenders, thread the needle through ball for the striker"></textarea>
  </div>

  <div class="section">
    <div class="section-label">Tenet scores</div>

    <div class="tenet-row">
      <div class="tenet-name">Technique</div>
      <div class="slider-wrap">
        <input type="range" min="1" max="10" value="5" step="1" id="s_technique">
      </div>
      <div class="tenet-val" id="v_technique">5</div>
    </div>

    <div class="tenet-row">
      <div class="tenet-name">Physicality</div>
      <div class="slider-wrap">
        <input type="range" min="1" max="10" value="5" step="1" id="s_physicality">
      </div>
      <div class="tenet-val" id="v_physicality">5</div>
    </div>

    <div class="tenet-row">
      <div class="tenet-name">Intellect</div>
      <div class="slider-wrap">
        <input type="range" min="1" max="10" value="5" step="1" id="s_intellect">
      </div>
      <div class="tenet-val" id="v_intellect">5</div>
    </div>

    <div class="tenet-row">
      <div class="tenet-name">Sequence</div>
      <div class="slider-wrap">
        <input type="range" min="1" max="10" value="5" step="1" id="s_sequence">
      </div>
      <div class="tenet-val" id="v_sequence">5</div>
    </div>

    <div class="tenet-row">
      <div class="tenet-name">Rhythm</div>
      <div class="slider-wrap">
        <input type="range" min="1" max="10" value="5" step="1" id="s_rhythm">
      </div>
      <div class="tenet-val" id="v_rhythm">5</div>
    </div>
  </div>

  <div class="section">
    <div class="toggles">
      <div class="toggle-group">
        <label>Magical moment</label>
        <div class="toggle-row">
          <button class="toggle-btn" id="mag_no" style="flex:1">No</button>
          <button class="toggle-btn active" id="mag_yes" style="flex:1">✦ Yes</button>
        </div>
      </div>
      <div class="toggle-group">
        <label>Overall beauty</label>
        <div class="toggle-row" style="gap:4px">
          <input type="number" id="overallScore" min="1" max="10" value="7" step="0.5"
            style="width:100%; background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'Bebas Neue',sans-serif; font-size:22px; text-align:center; padding:6px; outline:none;">
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Difficulty</div>
    <div class="difficulty-row">
      <button class="diff-btn" data-diff="0.8">Very Easy</button>
      <button class="diff-btn" data-diff="0.9">Easy</button>
      <button class="diff-btn active" data-diff="1.0">Medium</button>
      <button class="diff-btn" data-diff="1.1">Hard</button>
      <button class="diff-btn" data-diff="1.2">Very Hard</button>
    </div>
  </div>

  <button class="generate-btn" id="generateBtn">
    EVALUATE THE COMMITTEE
  </button>

</div>

<div class="error-box" id="errorBox"></div>

<div class="loading" id="loadingDiv">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Summoning the committee...</div>
</div>

<div class="results" id="resultsDiv">
  <div class="results-header">
    <div>
      <div class="results-title">Squad verdict</div>
      <div class="squad-avg" id="squadAvg">—</div>
    </div>
    <div style="text-align:right">
      <div class="squad-avg-label">Committee<br>Average</div>
    </div>
  </div>

  <div class="disagreement-card" id="disagreementCard">
    <div class="disagreement-label">⚡ Sharpest disagreement</div>
    <div class="disagreement-text" id="disagreementText">—</div>
  </div>

  <div id="personaCards"></div>

  <button class="reset-btn" id="resetBtn">← Score another clip</button>
</div>

<script>
const PERSONAS = [
  { name: 'Ron9',       country: 'Brazil',       flag: '🇧🇷', weights: { technique:4, physicality:3, intellect:1, sequence:2, rhythm:3, magical:5 }, identity: 'Joy, ginga, improvisation. Football as self-expression. The body must dance.' },
  { name: 'RQuaresma',  country: 'Portugal',     flag: '🇵🇹', weights: { technique:7, physicality:2, intellect:1, sequence:1, rhythm:2, magical:5 }, identity: 'Individual brilliance, the trivela. Flawless execution above everything. Technique is poetry.' },
  { name: 'El Diego',   country: 'Argentina',    flag: '🇦🇷', weights: { technique:3, physicality:2, intellect:2, sequence:2, rhythm:3, magical:6 }, identity: 'Street cunning, survival instinct. Beauty born from necessity and defiance. The magical moment is everything.' },
  { name: 'ZiZou',      country: 'France',       flag: '🇫🇷', weights: { technique:4, physicality:2, intellect:4, sequence:3, rhythm:2, magical:3 }, identity: 'Elegance and intelligence combined. The pirouette, the unexpected touch. Refinement in every movement.' },
  { name: 'Xaviniesta', country: 'Spain',        flag: '🇪🇸', weights: { technique:2, physicality:1, intellect:4, sequence:4, rhythm:5, magical:2 }, identity: 'The pass is the art form. Collective tempo and its variation. Beauty is rhythm and flow.' },
  { name: 'AndreP',     country: 'Italy',        flag: '🇮🇹', weights: { technique:3, physicality:1, intellect:7, sequence:2, rhythm:3, magical:2 }, identity: 'One player\'s genius unlocking the game. Tactical patience, the impossible pass. Intellect above all.' },
  { name: 'FranzB',     country: 'Germany',      flag: '🇩🇪', weights: { technique:2, physicality:3, intellect:3, sequence:5, rhythm:4, magical:1 }, identity: 'Efficiency elevated to beauty. Collective discipline, engineered precision. Structure is beautiful.' },
  { name: 'JohanC',     country: 'Netherlands',  flag: '🇳🇱', weights: { technique:3, physicality:1, intellect:5, sequence:3, rhythm:3, magical:3 }, identity: 'Totaalvoetbal. Space, positional freedom, geometric intelligence. Every player everywhere.' },
  { name: 'BobbyC',     country: 'England',      flag: '🏴󠁧󠁢󠁥󠁮󠁧󠁿', weights: { technique:2, physicality:6, intellect:2, sequence:2, rhythm:4, magical:2 }, identity: 'Directness, honest effort, powerful running. The long diagonal, the thunderous finish.' },
  { name: 'RogerM',     country: 'Cameroon',     flag: '🇨🇲', weights: { technique:3, physicality:5, intellect:1, sequence:1, rhythm:4, magical:4 }, identity: 'Raw athleticism, explosive unpredictability. The underdog creating the extraordinary.' },
  { name: 'Hidetoshi',  country: 'Japan',        flag: '🇯🇵', weights: { technique:2, physicality:1, intellect:4, sequence:6, rhythm:4, magical:1 }, identity: 'Disciplined collective precision. Every movement rehearsed, every pass exact. Zero waste.' },
];

let magical = 1;
let difficulty = 1.0;

function updateVal(tenet) {
  const val = document.getElementById('s_' + tenet).value;
  document.getElementById('v_' + tenet).textContent = val;
}

function setMagical(val) {
  magical = val;
  document.getElementById('mag_yes').classList.toggle('active', val === 1);
  document.getElementById('mag_no').classList.toggle('active', val === 0);
}

function setDiff(val, btn) {
  difficulty = val;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function getScores() {
  return {
    technique:   parseInt(document.getElementById('s_technique').value),
    physicality: parseInt(document.getElementById('s_physicality').value),
    intellect:   parseInt(document.getElementById('s_intellect').value),
    sequence:    parseInt(document.getElementById('s_sequence').value),
    rhythm:      parseInt(document.getElementById('s_rhythm').value),
    magical:     magical
  };
}

function computePersonaScore(persona, scores) {
  const w = persona.weights;
  const totalWeight = Object.values(w).reduce((a,b) => a+b, 0);
  const weighted = (
    scores.technique   * w.technique +
    scores.physicality * w.physicality +
    scores.intellect   * w.intellect +
    scores.sequence    * w.sequence +
    scores.rhythm      * w.rhythm +
    scores.magical     * w.magical * 10
  ) / (totalWeight);
  return Math.min(10, Math.max(1, parseFloat((weighted * difficulty).toFixed(1))));
}

const loadingMessages = [
  'Summoning the committee...',
  'Ron9 is feeling the ginga...',
  'AndreP is thinking deeply...',
  'The committee is deliberating...',
  'Verdicts incoming...'
];

async function generate() {
  const desc = document.getElementById('clipDesc').value.trim();
  if (!desc) {
    showError('Please describe the moment first.');
    return;
  }

  const scores = getScores();
  const overallScore = parseFloat(document.getElementById('overallScore').value) || 7;
  const diffLabel = difficulty === 0.8 ? 'Very Easy' : difficulty === 0.9 ? 'Easy' : difficulty === 1.0 ? 'Medium' : difficulty === 1.1 ? 'Hard' : 'Very Hard';

  document.getElementById('generateBtn').disabled = true;
  document.getElementById('errorBox').classList.remove('show');
  document.getElementById('inputSection').style.display = 'none';
  document.getElementById('generateBtn').style.display = 'none';
  document.getElementById('loadingDiv').classList.add('show');
  document.getElementById('resultsDiv').classList.remove('show');

  let msgIdx = 0;
  const msgInterval = setInterval(() => {
    msgIdx = (msgIdx + 1) % loadingMessages.length;
    document.getElementById('loadingText').textContent = loadingMessages[msgIdx];
  }, 1800);

  const computedScores = PERSONAS.map(p => ({
    ...p,
    score: computePersonaScore(p, scores)
  }));

  const personaList = computedScores.map(p =>
    `${p.name} (${p.country}): score ${p.score}/10 — identity: "${p.identity}"`
  ).join('\n');

  const prompt = `You are generating verdicts for the Joga Bonito Committee — 11 football personas from different cultures evaluating a beautiful moment.

CLIP: "${desc}"
Overall beauty score: ${overallScore}/10
Tenet scores: Technique ${scores.technique}/10, Physicality ${scores.physicality}/10, Intellect ${scores.intellect}/10, Sequence ${scores.sequence}/10, Rhythm ${scores.rhythm}/10, Magical: ${magical ? 'Yes' : 'No'}
Difficulty: ${diffLabel}

Each persona has already been assigned a score based on their cultural weighting vector. Your job is to write a short, vivid verdict in each persona's distinct voice that explains WHY they gave that score. The verdict must feel like it comes from that specific football culture — use vocabulary, references, and sensibility authentic to that culture.

Personas and their pre-computed scores:
${personaList}

Return ONLY a JSON array. No markdown, no preamble. Each object: { "name": "...", "verdict": "..." }
Verdicts must be 20-35 words. First person. Vivid. Opinionated. Reference the specific moment described. Each voice must be clearly distinct from the others.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    clearInterval(msgInterval);

    if (data.error) throw new Error(data.error.message);

    let raw = data.content[0].text.trim();
    raw = raw.replace(/```json|```/g, '').trim();
    const verdicts = JSON.parse(raw);

    const verdictMap = {};
    verdicts.forEach(v => { verdictMap[v.name] = v.verdict; });

    const sortedPersonas = [...computedScores].sort((a,b) => b.score - a.score);
    const avg = computedScores.reduce((s,p) => s+p.score, 0) / computedScores.length;
    const highest = sortedPersonas[0];
    const lowest = sortedPersonas[sortedPersonas.length-1];
    const gap = (highest.score - lowest.score).toFixed(1);

    document.getElementById('squadAvg').textContent = avg.toFixed(1);
    document.getElementById('disagreementText').textContent =
      `${highest.name} gives it ${highest.score} — ${lowest.name} gives it ${lowest.score}. A ${gap} point gap. ${highest.country} and ${lowest.country} could not disagree more.`;

    const cards = document.getElementById('personaCards');
    cards.innerHTML = '';

    sortedPersonas.forEach((p, i) => {
      const scoreClass = p.score >= 8 ? 'high' : p.score <= 4 ? 'low' : '';
      const barWidth = (p.score / 10 * 100).toFixed(0);
      const barColor = p.score >= 8 ? '#FFD600' : p.score <= 4 ? '#ff5252' : '#00C853';
      const card = document.createElement('div');
      card.className = 'persona-card';
      card.style.animationDelay = (i * 0.05) + 's';
      card.innerHTML = `
        <div class="persona-header">
          <div class="persona-identity">
            <div class="persona-flag">${p.flag}</div>
            <div>
              <div class="persona-name">${p.name}</div>
              <div class="persona-country">${p.country}</div>
            </div>
          </div>
          <div class="persona-score ${scoreClass}">${p.score}</div>
        </div>
        <div class="score-bar">
          <div class="score-bar-fill" style="width:${barWidth}%; background:${barColor}"></div>
        </div>
        <div class="persona-verdict">"${verdictMap[p.name] || '...'}"</div>
      `;
      cards.appendChild(card);
    });

    document.getElementById('loadingDiv').classList.remove('show');
    document.getElementById('resultsDiv').classList.add('show');

  } catch(err) {
    clearInterval(msgInterval);
    document.getElementById('loadingDiv').classList.remove('show');
    document.getElementById('inputSection').style.display = 'block';
    document.getElementById('generateBtn').style.display = 'block';
    document.getElementById('generateBtn').disabled = false;
    showError('Something went wrong: ' + err.message);
  }
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.add('show');
}

function reset() {
  document.getElementById('resultsDiv').classList.remove('show');
  document.getElementById('inputSection').style.display = 'block';
  document.getElementById('generateBtn').style.display = 'block';
  document.getElementById('generateBtn').disabled = false;
  document.getElementById('errorBox').classList.remove('show');
  document.getElementById('clipDesc').value = '';
  window.scrollTo(0, 0);
}

document.addEventListener('DOMContentLoaded', function() {
  ['technique','physicality','intellect','sequence','rhythm'].forEach(function(t) {
    document.getElementById('s_' + t).addEventListener('input', function() {
      updateVal(t);
    });
  });

  document.getElementById('mag_yes').addEventListener('click', function() { setMagical(1); });
  document.getElementById('mag_no').addEventListener('click', function() { setMagical(0); });

  document.querySelectorAll('.diff-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      setDiff(parseFloat(btn.dataset.diff), btn);
    });
  });

  document.getElementById('generateBtn').addEventListener('click', generate);
  document.getElementById('resetBtn').addEventListener('click', reset);
});
</script>
</body>
</html>
